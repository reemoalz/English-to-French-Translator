<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>English to French Translator</title>

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='style.css') }}"
    >
</head>

<body>

    <div class="container">

        <h1>English to French Translator</h1>

        <p>
            Enter a short English sentence.
        </p>

        <form method="POST">

            <textarea
                name="english_text"
                placeholder="Example: My favorite fruit is apple"
                required
            >{{ english_text }}</textarea>

            <button type="submit">
                Translate
            </button>

        </form>

        {% if error %}

            <div class="error">
                {{ error }}
            </div>

        {% endif %}

        {% if translation %}

            <div class="result">

                <h2>French Translation</h2>

                <p>{{ translation }}</p>

            </div>

        {% endif %}

    </div>

</body>

</html>
